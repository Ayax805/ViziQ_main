<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style_v2.css">
    <title>VIZIQ - Регистрация</title>
    <link rel="icon" type="image/x-icon" href="logo.png">
    
    <!-- Для современных браузеров (PNG) -->
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="logo.png">
    
    <!-- Для Apple устройства (iPhone, iPad) -->
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    
    <!-- Для Android/Chrome -->
    <link rel="manifest" href="logo.png">
</head>
<body class="min-vh-100 d-flex justify-content-center align-items-center p-3" 
      style="background: linear-gradient(to right, #e2e2e2, #c9d6ff);">

    <!-- Основной блок-карточка -->
    <div class="position-relative bg-white rounded-4 shadow-lg overflow-hidden" 
         style="width: 100%; max-width: 800px; min-height: 500px;">
        
        <!-- Форма ВХОДА -->
        <div id="Ent" class="position-absolute top-0 start-0 w-100 h-100 bg-white transition-all" 
             style="transition: transform 0.6s ease-in-out; transform: translateX(0); z-index: 2;">
            <div class="row h-100 g-0">
                <!-- Левая часть (форма) -->
                <div class="col-12 col-md-6 d-flex flex-column justify-content-center align-items-center p-4 p-md-5">
                    <h1 class="fw-bold mb-4 text-center">Вход</h1>
                    <input type="email" class="form-control bg-light border-0 rounded-4 py-2 mb-3" 
                           placeholder="Введите email" style="max-width: 280px;">
                    <input type="password" class="form-control bg-light border-0 rounded-4 py-2 mb-3" 
                           placeholder="Введите пароль" style="max-width: 280px;">
                    <a href="#" class="text-decoration-none text-dark mb-4 small">Забыли пароль?</a>
                    <button class="btn rounded-pill text-white fw-semibold px-4 py-2" 
                            style="background: linear-gradient(to right, #2E3C88, #0F5AF0, #5069EE); border: none; max-width: 200px;">
                        Войти
                    </button>
                </div>
                
                <!-- Правая часть (синяя) -->
                <div class="col-12 col-md-6 d-flex flex-column justify-content-center align-items-center text-white p-4 p-md-5"
                     style="background: linear-gradient(to right, #2E3C88, #0F5AF0, #5069EE);">
                    <p class="fw-bold fs-3 text-center">Привет, друг!</p>
                    <p class="text-center small opacity-75">Зарегистрируйтесь, указав свои данные, чтобы использовать все функции сайта.</p>
                    <button id="regBtn" class="btn btn-outline-light rounded-pill px-4 py-2 mt-3 fw-semibold">
                        Зарегистрироваться
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Форма РЕГИСТРАЦИИ -->
        <div id="Reg" class="position-absolute top-0 start-0 w-100 h-100 bg-white transition-all" 
             style="transition: transform 0.6s ease-in-out; transform: translateX(100%); z-index: 1;">
            <div class="row h-100 g-0">
                <!-- Левая часть (синяя) -->
                <div class="col-12 col-md-6 d-flex flex-column justify-content-center align-items-center text-white p-4 p-md-5 order-md-1"
                     style="background: linear-gradient(to right, #2E3C88, #0F5AF0, #5069EE);">
                    <p class="fw-bold fs-3 text-center">Привет, друг!</p>
                    <p class="text-center small opacity-75">Если вы зарегистрированы, войдите в аккаунт чтобы использовать все функции сайта.</p>
                    <button id="EntBtnFromReg" class="btn btn-outline-light rounded-pill px-4 py-2 mt-3 fw-semibold">
                        Войти
                    </button>
                </div>
                
                <!-- Правая часть (форма регистрации) -->
                <div class="col-12 col-md-6 d-flex flex-column justify-content-center align-items-center p-4 p-md-5 order-md-0">
                    <h1 class="fw-bold mb-4 text-center">Регистрация</h1>
                    <input type="text" class="form-control bg-light border-0 rounded-4 py-2 mb-3" 
                           placeholder="Введите username" style="max-width: 280px;">
                    <input type="email" class="form-control bg-light border-0 rounded-4 py-2 mb-3" 
                           placeholder="Введите email" style="max-width: 280px;">
                    <input type="password" class="form-control bg-light border-0 rounded-4 py-2 mb-4" 
                           placeholder="Введите пароль" style="max-width: 280px;">
                    <button class="btn rounded-pill text-white fw-semibold px-4 py-2" 
                            style="background: linear-gradient(to right, #2E3C88, #0F5AF0, #5069EE); border: none; max-width: 200px;">
                        Зарегистрироваться
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const whiteZone = document.querySelector('.position-relative');
        const regBtn = document.querySelector('#regBtn');
        const entBtnFromReg = document.querySelector('#EntBtnFromReg');
        
        if (regBtn) {
            regBtn.addEventListener('click', function() {
                whiteZone.classList.add('active');
            });
        }
        
        if (entBtnFromReg) {
            entBtnFromReg.addEventListener('click', function() {
                whiteZone.classList.remove('active');
            });
        }
    </script>

    <style>
        /* Анимация переключения */
        .position-relative.active #Ent {
            transform: translateX(-100%) !important;
            z-index: 1 !important;
        }
        
        .position-relative.active #Reg {
            transform: translateX(0) !important;
            z-index: 2 !important;
        }
        
        @media (max-width: 768px) {
            .position-relative.active #Ent {
                transform: translateY(-100%) !important;
            }
            
            .position-relative.active #Reg {
                transform: translateY(0) !important;
            }
            
            .position-relative #Ent {
                transform: translateY(0);
            }
            
            .position-relative #Reg {
                transform: translateY(100%);
            }
        }
        
        .transition-all {
            transition: all 0.6s ease-in-out;
        }
    </style>
</body>
</html>
