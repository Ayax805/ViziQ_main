<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZIQ - Выбор</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style_v3.css">
    <link rel="icon" type="image/x-icon" href="logo.png">
    
    <!-- Для современных браузеров (PNG) -->
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="logo.png">
    
    <!-- Для Apple устройства (iPhone, iPad) -->
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    
    <!-- Для Android/Chrome -->
    <link rel="manifest" href="logo.png">
</head>
<body>
    <div class="container-fluid">
        <div class="row vw-25" id="header-fon">
            <div class="col-4 col-md-4 col-lg-2 p-4">
                <img src="logo.png" alt="Логотип" class="img-fluid" id="logo">
            </div>
            <div class="col-5 col-md-5 col-lg-7 text-end ">
                <a href="Main-Page.html" class="text-decoration-none text-white p-3"><span><b>На главную</b></span></a>
                <a href="profile-Page.html" class="text-decoration-none text-white p-3"><span><b>Профиль</b></span></a>
            </div>
            <div class="col-3 col-md-3 col-3" >
                <img src="avatar.png" alt="Фото" class="img-fluid" id="avatar">
                <span class="text-white"><b>Гия Р.О.</b></span>
            </div>
        </div>
        <div class="row justify-content-center align-items-center p-lg-5 m-lg-5">
                <div class="col-12 col-md-12 col-lg-6 text-center " id="main">
                    <div class="row  justify-content-center p-2">
                        <h1><span>Какая вы Визитка?</span></h1>
                        <div class="col-12 col-md-12 col-lg-5 text-center justify-content-top">
                            <span>Самостоятельная</span>
                            <button id="soloBtn"><img src="solo.png" alt="png" id="solo"></button>
                        </div>
                        <div class="col-12 col-md-12 col-lg-1 text-center align-content-center p-2"><span>ИЛИ</span></div>
                        <div class="col-12 col-md-12 col-lg-5 text-center justify-content-top">
                            <span class="no-wrap">Для компании</span>
                            <button id="compaignBtn"><img src="compign.png" alt="png" id="compaign"></button>
                        </div>
                    </div>
                </div>
        </div>
            
    </div>
</body>
<script>
    const campaign_link=document.getElementById('compaignBtn')
    campaign_link.onclick = () =>  window.location='Setting-Page-Campaign.html'
    const person_link=document.getElementById('soloBtn')
    person_link.onclick = () =>  window.location='Setting-Page-Personal.html'
</script>
</html>
